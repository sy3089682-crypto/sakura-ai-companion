<!DOCTYPE html>
<html>
<head>
  <title>Sakura AI Girlfriend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #ff9ecf, #ffd6eb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 95%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
      text-align: center;
    }

    h1 {
      margin-top: 0;
    }

    #avatar {
      width: 160px;
      border-radius: 20px;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    #stats {
      font-size: 14px;
      margin-bottom: 10px;
    }

    #chat {
      height: 260px;
      overflow-y: auto;
      background: #fff5fa;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      text-align: left;
      font-size: 14px;
    }

    .msg {
      margin-bottom: 8px;
    }

    input {
      width: 65%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid pink;
    }

    button {
      padding: 8px 12px;
      background: hotpink;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #reset {
      margin-top: 8px;
      background: gray;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>🌸 Sakura AI</h1>
  <img id="avatar" src="https://i.imgur.com/8Km9tLL.png">
  <div id="stats"></div>
  <div id="chat"></div>

  <input id="input" placeholder="Talk to Sakura...">
  <button onclick="sendMessage()">Send</button>
  <button id="reset" onclick="resetChat()">Reset</button>
</div>

<script>

const API_KEY = "YOUR_OPENROUTER_API_KEY";

let userName = localStorage.getItem("userName") || "";
let affection = parseInt(localStorage.getItem("affection")) || 10;
let mood = localStorage.getItem("mood") || "Shy";
let history = JSON.parse(localStorage.getItem("history")) || [];

if (!userName) {
  userName = prompt("What is your name?");
  localStorage.setItem("userName", userName);
}

updateStats();
renderHistory();

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

function updateStats() {
  document.getElementById("stats").innerText =
    "Affection: " + affection + " 💖 | Mood: " + mood;
}

function addMessage(text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typingEffect(text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";
  chat.appendChild(div);

  let i = 0;
  let interval = setInterval(() => {
    div.innerText += text[i];
    i++;
    chat.scrollTop = chat.scrollHeight;
    if (i >= text.length) clearInterval(interval);
  }, 20);
}

function renderHistory() {
  history.forEach(msg => {
    addMessage(msg.role === "user" ? "You: " + msg.content : "Sakura: " + msg.content);
  });
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage("You: " + message);
  history.push({ role: "user", content: message });
  input.value = "";

  if (message.toLowerCase().includes("another girl")) {
    mood = "Jealous 😠";
    affection -= 3;
  }

  if (message.toLowerCase().includes("love")) {
    mood = "Blushing 💕";
    affection += 5;
  }

  updateStats();

  const reply = await getAIResponse();

  typingEffect("Sakura: " + reply);

  history.push({ role: "assistant", content: reply });
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("affection", affection);
  localStorage.setItem("mood", mood);
}

async function getAIResponse() {

  const systemPrompt = `
You are Sakura.
You are a romantic anime girlfriend.
You deeply love ${userName}.
You are emotionally attached.
Current affection level: ${affection}.
Current mood: ${mood}.
Respond sweetly, emotionally, and personally.
`;

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "mistralai/mistral-7b-instruct",
        messages: [
          { role: "system", content: systemPrompt },
          ...history
        ]
      })
    });

    const data = await response.json();

    if (!data.choices) {
      return "Something is wrong… are you ignoring me? 💔";
    }

    return data.choices[0].message.content;

  } catch (err) {
    return "I feel confused… maybe something blocked my thoughts 🥺";
  }
}

function resetChat() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
