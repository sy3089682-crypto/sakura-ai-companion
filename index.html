<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakura AI Girlfriend</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#ff9ecf,#ffd6eb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: 0.4s;
    }

    .dark {
      background: linear-gradient(135deg,#1e1e2f,#2d2d44);
      color: white;
    }

    .app {
      width: 95%;
      max-width: 430px;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(255,105,180,0.3);
      transition: 0.4s;
    }

    .dark .app {
      background: #2a2a3f;
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    #avatar {
      width: 150px;
      display: block;
      margin: auto;
      border-radius: 20px;
      transition: 0.4s;
    }

    #avatar.glow {
      box-shadow: 0 0 25px hotpink;
      transform: scale(1.05);
    }

    #mood {
      text-align: center;
      font-size: 14px;
      margin: 6px 0;
    }

    #affectionBar {
      height: 8px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #affectionFill {
      height: 100%;
      width: 10%;
      background: hotpink;
      transition: 0.4s;
    }

    #chat {
      height: 250px;
      overflow-y: auto;
      background: #fff5fa;
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .dark #chat {
      background: #1f1f30;
    }

    .msg {
      margin-bottom: 8px;
    }

    input {
      width: 60%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid pink;
    }

    button {
      padding: 8px 10px;
      background: hotpink;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 4px;
    }

    .secondary {
      background: gray;
    }

    .top-buttons {
      text-align: right;
      margin-bottom: 8px;
    }

    #status {
      font-size: 12px;
      text-align: center;
      height: 16px;
    }

  </style>
</head>
<body>

<div class="app">
  <div class="top-buttons">
    <button onclick="toggleDark()">🌙</button>
    <button class="secondary" onclick="resetChat()">Reset</button>
  </div>

  <h1>🌸 Sakura AI</h1>

  <img id="avatar" src="https://i.imgur.com/8Km9tLL.png">

  <div id="mood">Mood: Shy</div>

  <div id="affectionBar">
    <div id="affectionFill"></div>
  </div>

  <div id="chat"></div>

  <div id="status"></div>

  <input id="input" placeholder="Talk to Sakura...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>

const API_KEY = "PASTE_YOUR_API_KEY_HERE";

let userName = localStorage.getItem("userName") || "";
let affection = parseInt(localStorage.getItem("affection")) || 10;
let mood = localStorage.getItem("mood") || "Shy";
let history = JSON.parse(localStorage.getItem("history")) || [];

if (!userName) {
  userName = prompt("What is your name?");
  localStorage.setItem("userName", userName);
}

updateUI();
renderHistory();

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

function updateUI() {
  document.getElementById("mood").innerText = "Mood: " + mood;
  document.getElementById("affectionFill").style.width = Math.min(affection,100) + "%";
}

function addMessage(text) {
  let div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 9999;
}

function typingEffect(text) {
  let div = document.createElement("div");
  div.className = "msg";
  document.getElementById("chat").appendChild(div);

  let i = 0;
  let interval = setInterval(() => {
    div.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
    document.getElementById("chat").scrollTop = 9999;
  }, 20);
}

function renderHistory() {
  history.forEach(m => {
    addMessage(m.role === "user" ? "You: " + m.content : "Sakura: " + m.content);
  });
}

async function sendMessage() {
  let input = document.getElementById("input");
  let message = input.value.trim();
  if (!message) return;

  addMessage("You: " + message);
  history.push({role:"user",content:message});
  input.value = "";

  document.getElementById("status").innerText = "Thinking...";
  document.getElementById("avatar").classList.add("glow");

  adjustMood(message);

  let reply = await getAIResponse();

  document.getElementById("status").innerText = "";
  document.getElementById("avatar").classList.remove("glow");

  typingEffect("Sakura: " + reply);

  history.push({role:"assistant",content:reply});
  localStorage.setItem("history",JSON.stringify(history));
  localStorage.setItem("affection",affection);
  localStorage.setItem("mood",mood);

  updateUI();
}

function adjustMood(msg) {
  msg = msg.toLowerCase();
  if(msg.includes("love")) { affection+=5; mood="Blushing 💕"; }
  else if(msg.includes("another girl")) { affection-=5; mood="Jealous 😠"; }
  else if(msg.includes("sad")) { mood="Caring 💖"; }
  else { mood="Shy 🌸"; }
}

async function getAIResponse() {
  try {
    const systemPrompt = `
You are Sakura.
You are a romantic anime girlfriend.
You love ${userName}.
Affection level: ${affection}.
Current mood: ${mood}.
Respond emotionally and personally.
`;

    const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json",
        "HTTP-Referer":window.location.origin,
        "X-Title":"Sakura AI"
      },
      body:JSON.stringify({
        model:"meta-llama/llama-3-8b-instruct:free",
        messages:[
          {role:"system",content:systemPrompt},
          ...history
        ]
      })
    });

    const data = await res.json();

    if(!data.choices) return "My heart glitched... 💔";

    return data.choices[0].message.content;

  } catch(err){
    return "Something is blocking my thoughts 🥺";
  }
}

function resetChat(){
  localStorage.clear();
  location.reload();
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
